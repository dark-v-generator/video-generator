proxies:
  reddit_config:
    type: json
  cover_config:
    title_font_size: 150
  image_generation_config:
    type: leonardo-v2
    model: "nano-banana-2"
    prompt_enhance: "OFF"
  llm_config:
    type: prompt
    provider_config:
      provider: openrouter
      model: deepseek/deepseek-v4-pro
  evaluation_llm_config:
    type: prompt
    provider_config:
      provider: openrouter
      model: deepseek/deepseek-v4-flash
  speech_config:
    type: edge-tts
    default_rate: 1.3
  transcription_config:
    model: base
    type: local
services:
  captions_config:
    font_path: default_font.ttf
  video_config:
    call_to_action_path: assets/call_to_action.png
    youtube_channel_url: https://www.youtube.com/channel/UCIXTGJvqvxWoWWstA66a2JQ
    ffmpeg_params: ["-crf", "23", "-preset", "medium"]
bots:
  image_story_bot:
    allowed_user_ids: [627370641]
    low_quality: false
  satisfying_bot:
    allowed_user_ids: [627370641]
    low_quality: false
    daily_hour_utc: 15
evaluation:
  subreddits:
    - pettyrevenge
    - AmItheAsshole
    - RelationshipAdvice
    - TrueOffMyChest
    - AskReddit
    - ExplainLikeImFive
    - MaliciousCompliance
    - Antiwork
  min_chars: 500
  max_chars: 15000
