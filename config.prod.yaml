language: pt-br
proxies:
  reddit_config:
    type: json
  cover_config:
    title_font_size: 150
  tiktok_publisher_config:
    agent_model: deepseek/deepseek-v4-flash
    cookies_path: .storage/tiktok_cookies.json
    headless: false
    use_vision: false
    max_steps: 60
  image_generation_config:
    type: leonardo-v2
    model: "nano-banana-2"
    prompt_enhance: "OFF"
  llm_config:
    type: prompt
    provider_config:
      provider: openrouter
      model: deepseek/deepseek-v4-flash
  history_adaptation_llm_config:
    type: prompt
    provider_config:
      provider: openrouter
      model: moonshotai/kimi-k2.6
  speech_config:
    type: edge-tts
    default_rate: 1.3
  transcription_config:
    model: base
    type: local
services:
  captions_config:
    font_path: default_font.ttf
  video_config:
    call_to_action_path: assets/call_to_action.png
    youtube_channel_url: https://www.youtube.com/@FoodieBoyKR
    youtube_channel_urls:
      - https://www.youtube.com/@FoodieBoyKR
      - https://www.youtube.com/@cookming
      - https://www.youtube.com/@menwiththepot
    youtube_surface: shorts
    youtube_pool_size: 50
    ffmpeg_params: ["-crf", "23", "-preset", "medium"]
    anti_fingerprint:
      enabled: true
      mirror: true
      zoom: 1.04
      brightness_delta: 0.02
      contrast_delta: 0
      hue_shift_degrees: 0
      speed_delta: 0.02
bots:
  image_story_bot:
    allowed_user_ids: [627370641]
    low_quality: false
  satisfying_bot:
    allowed_user_ids: [627370641]
    low_quality: false
    daily_hour_utc: 9
    daily_minute_utc: 30
    daily_auto_publish_count: 4
    publish_slots_local:
      - "11:00"
      - "13:00"
      - "18:00"
      - "20:00"
    publish_min_lead_minutes: 30
    publish_hashtags: []
evaluation:
  subreddits:
    - pettyrevenge
    - AmItheAsshole
    - RelationshipAdvice
    - TrueOffMyChest
    - AskReddit
    - ExplainLikeImFive
    - MaliciousCompliance
    - Antiwork
    - EuSouOBabaca
    - RelatosDoReddit
    - relacionamentos
  min_chars: 500
  max_chars: 15000
