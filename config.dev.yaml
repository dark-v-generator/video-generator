language: pt-br
proxies:
  cover_config:
    title_font_size: 150
  image_generation_config:
    type: mock
  llm_config:
    type: mock
  history_adaptation_llm_config:
    type: mock
  reddit_config:
    type: json
  speech_config:
    type: edge-tts
    default_rate: 1.2
  transcription_config:
    model: base
    type: local
services:
  captions_config:
    font_path: default_font.ttf
  video_config:
    call_to_action_path: assets/call_to_action.png
    youtube_channel_url: https://www.youtube.com/@foodieboykr
    youtube_channel_urls:
      - https://www.youtube.com/@foodieboykr
      - https://www.youtube.com/@cookming
      - https://www.youtube.com/@menwiththepot
    youtube_surface: shorts
    ffmpeg_params: ["-crf", "28", "-preset", "fast"]
    anti_fingerprint:
      enabled: true
      mirror: true
      zoom: 1.06
      brightness_delta: 0.04
      contrast_delta: 8.0
      hue_shift_degrees: 8.0
      speed_delta: 0.02
bots:
  image_story_bot:
    allowed_user_ids: [627370641]
    low_quality: false
  satisfying_bot:
    allowed_user_ids: [627370641]
    low_quality: false
evaluation:
  subreddits:
    - pettyrevenge
    - AmItheAsshole
    - RelationshipAdvice
    - TrueOffMyChest
    - AskReddit
    - ExplainLikeImFive
    - MaliciousCompliance
    - Antiwork
    - EuSouOBabaca
    - RelatosDoReddit
    - relacionamentos
  min_chars: 500
  max_chars: 15000
