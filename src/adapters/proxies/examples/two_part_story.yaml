# DSPy Examples for 2-part TikTok Story Generation
- original_post:
    title: "Estranged ex GF came back after 10 years and called me a lier when she found out I already moved on."
    text: |
      Não sei bem como começar esta história que aconteceu há alguns meses, mas tem um histórico de 10 anos. Quando eu tinha 14 anos, me apaixonei por uma colega de classe. Ela era meio ingênua de um jeito fofo e ria muito das minhas piadas, mesmo quando eram às custas dela. Comecei a conquistar ela e ela hesitou no início, já que éramos amigos muito próximos. Mas ela me disse que me daria uma chance, já que gostava de estar perto de mim. Depois de 3 a 4 meses de cortejo, ela finalmente disse sim e nos tornamos oficialmente namorados. Nos apaixonamos profundamente e namoramos até nos formarmos no ensino médio. Após a formatura, durante as férias de verão, ela me disse que precisava morar com a irmã na capital para a faculdade. Eu disse que tudo bem, que faríamos um relacionamento à distância funcionar. Eu estudei em uma das universidades da nossa província, enquanto ela foi para a cidade com a irmã e decidiu tirar um ano sabático antes de entrar na faculdade. Mantivemos a comunicação durante os primeiros meses à distância. No nosso quarto aniversário, ela me disse que não importava o que acontecesse, eu deveria esperar por ela. Mas, meses depois, ela simplesmente desapareceu. Seu telefone estava desligado, suas redes sociais inativas. Quando tentei me comunicar e fui ignorado, fiquei devastado. Ela virou alguém que eu costumava conhecer. Um de seus amigos estudava no mesmo campus que eu, e uma vez nos encontramos. Tomamos um café e ele me entregou uma carta que ela havia enviado, dizendo que não poderia mais manter o relacionamento à distância e desejava seguir em frente.
  part1: |
      Minha namorada reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 1. Não sei bem como começar esta história que aconteceu há alguns meses, mas tem um histórico de 10 anos. Quando eu tinha 14 anos, me apaixonei por uma colega de classe. Ela era meio ingênua de um jeito fofo e ria muito das minhas piadas, mesmo quando eram às custas dela. Comecei a conquistar ela e ela hesitou no início, já que éramos amigos muito próximos. Mas ela me disse que me daria uma chance, já que gostava de estar perto de mim. Depois de 3 a 4 meses de cortejo, ela finalmente disse sim e nos tornamos oficialmente namorados. Nos apaixonamos profundamente e namoramos até nos formarmos no ensino médio. Após a formatura, durante as férias de verão, ela me disse que precisava morar com a irmã na capital para a faculdade. Eu disse que tudo bem, que faríamos um relacionamento à distância funcionar. Eu estudei em uma das universidades da nossa província, enquanto ela foi para a cidade com a irmã e decidiu tirar um ano sabático antes de entrar na faculdade. Mantivemos a comunicação durante os primeiros meses à distância. No nosso quarto aniversário, ela me disse que não importava o que acontecesse, eu deveria esperar por ela. Mas, meses depois, ela simplesmente desapareceu. Seu telefone estava desligado, suas redes sociais inativas. Quando tentei me comunicar e fui ignorado, fiquei devastado. Ela virou alguém que eu costumava conhecer. Um de seus amigos estudava no mesmo campus que eu, e uma vez nos encontramos. Tomamos um café e ele me entregou uma carta que ela havia enviado, dizendo que não poderia mais manter o relacionamento à distância e desejava seguir em frente. Curta e me siga para a parte 2.
  part2: |
      Minha namorada reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 2. Doeu muito, mas decidi respeitar a decisão dela e também seguir em frente. Um ano depois, conheci outra garota em um workshop. Começamos a sair e, quase um ano depois, começamos a namorar. Agora, somos profissionais, temos uma filha linda, estamos juntos há 8 anos e casados há 2. De repente, recebi uma ligação de um número desconhecido. Era minha ex, perguntando se poderíamos nos encontrar. Aceitei, com a condição de levar minha esposa. Ela ficou furiosa ao telefone, mas insistiu em me encontrar sem minha esposa. Concordamos em nos encontrar em um shopping. Ela me contou que tinha um filho de 4 anos e estava separada do parceiro, que era marinheiro e cortou a comunicação com ela. Quando descobriu que eu era casado e tinha uma filha, ficou chocada porque eu havia prometido esperar por ela. Eu fiquei atônito com a audácia dela. A interrompi e disse que ela não podia simplesmente reaparecer na minha vida depois de 10 anos e de tudo o que aconteceu, esperando que eu mantivesse uma promessa de 10 anos atrás que ela mesma havia quebrado. Disse para ela nunca mais entrar em contato comigo. Voltei para a minha esposa e filha em outro restaurante. Minha esposa perguntou como tinha sido e eu disse que contaria tudo quando chegássemos em casa. Ao chegarmos, contei a história e ela me abraçou. Sou extremamente grato por tudo que tenho agora. Aquela ex pode ter sido o meu primeiro amor, mas minha esposa é o maior de todos. O que achou dessa história? Curta e me siga para mais histórias.
      
- original_post:
    title: "My new downstairs neighbor made the manager harass me. I hope he likes being woken up at 2 am every night."
    text: |
      Moro no mesmo apartamento com meu namorado há quase quatro anos. Não é o melhor apartamento, mas adoro a localização. Nunca tive realmente problemas aqui, sou uma vizinha tranquila e fico na minha. Meu novo vizinho de baixo fez várias reclamações tolas, como reclamar por eu usar o triturador de lixo. Mas a mais recente foi ridícula. Ele foi falar com o síndico que havia problemas com a minha varanda. Recebi uma ligação na semana passada perguntando se eu tinha jogado algo pela minha varanda. Eu disse ao síndico que absolutamente não. Há plantas embaixo, então, eu tinha jogado água nelas. Mas isso não prejudica ninguém. Por causa dessa ligação, fui investigar minha varanda. Percebi que meu vaso de flores tinha caído e que um pouco de água pode ter escorrido. Nada demais, não havia muita água no vaso quando o vento derrubou. Achei que tinha sido o fim daquela queixa tola. Mas eu estava errada. O fim de semana passa e recebo um aviso rude na minha porta. O aviso dizia violação de animal de estimação por não limpar após o meu cachorro. Multa de 50 dólares dos Estados Unidos. E afirmava que eu corria o risco de ter meu contrato de aluguel terminado por causa das minhas violações. O único problema é, eu não tenho um cachorro. Então, eu fui tirar satisfação sobre isso. Enviei um e-mail para a gerente do prédio e disse: não tenho um cachorro. Portanto, não vou pagar essa multa. Ela me responde com um e-mail absurdo, afirmando que recebeu várias reclamações (só tenho um vizinho de baixo) sobre urina vindo da minha varanda. Então ela supôs que eu estava deixando o meu cachorro, que não tenho, fazer xixi na varanda. Aí ela diz que, como não tenho um cachorro, significa que eu ou meu namorado estamos fazendo xixi na nossa varanda. E que ainda estou violando o meu contrato de aluguel. Isso já era cômico. Meu namorado e eu NUNCA fizemos isso. Nunca tivemos reclamações nos nossos quatro anos aqui. E justamente quando ganham um novo vizinho de baixo, começam as reclamações. Agora vem a doce vingança. Trabalho no turno da noite, então não vou para a cama até por volta das seis da manhã. Todas as manhãs, por volta das seis horas, ouço meu novo vizinho saindo para o trabalho. Meu namorado e eu decidimos incorporar um novo treino às duas da manhã, quando volto do trabalho, consistindo em polichinelos, corrida no lugar, e todo tipo de atividade divertida. Só para o meu querido vizinho de baixo. Informei ao escritório de locação que não renovarei meu contrato de aluguel em dezembro por causa disso. Os próximos três meses para o meu novo vizinho serão um inferno. Espero que ele aproveite.
  part1: |
