- base_text: Meu novo vizinho do andar de baixo fez o síndico me importunar. Espero que ele goste de ser acordado às duas da manhã todas as noites. Parte 1. Moro no mesmo apartamento com meu namorado há quase quatro anos. Não é o melhor apartamento, mas adoro a localização. Nunca tive realmente problemas aqui, sou uma vizinha tranquila e fico na minha. Meu novo vizinho de baixo fez várias reclamações tolas, como reclamar por eu usar o triturador de lixo. Mas a mais recente foi ridícula. Ele foi falar com o síndico que havia problemas com a minha varanda. Recebi uma ligação na semana passada perguntando se eu tinha jogado algo pela minha varanda. Eu disse ao síndico que absolutamente não. Há plantas embaixo, então, eu tinha jogado água nelas. Mas isso não prejudica ninguém. Por causa dessa ligação, fui investigar minha varanda. Percebi que meu vaso de flores tinha caído e que um pouco de água pode ter escorrido. Nada demais, não havia muita água no vaso quando o vento derrubou. Achei que
    tinha sido o fim daquela queixa tola. Mas eu estava errada. O fim de semana passa e recebo um aviso rude na minha porta. O aviso dizia violação de animal de estimação por não limpar após o meu cachorro. Multa de 50 dólares dos Estados Unidos. E afirmava que eu corria o risco de ter meu contrato de aluguel terminado por causa das minhas violações. O único problema é, eu não tenho um cachorro. Então, eu fui tirar satisfação sobre isso. Curta e me siga para a parte 2.
