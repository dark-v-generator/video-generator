- base_text: Minha namorada reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 1. Não sei bem como começar esta história que aconteceu há alguns meses, mas tem um histórico de 10 anos. Quando eu tinha 14 anos, me apaixonei por uma colega de classe. Ela era meio ingênua de um jeito fofo e ria muito das minhas piadas, mesmo quando eram às custas dela. Comecei a conquistar ela e ela hesitou no início, já que éramos amigos muito próximos. Mas ela me disse que me daria uma chance, já que gostava de estar perto de mim. Depois de 3 a 4 meses de cortejo, ela finalmente disse sim e nos tornamos oficialmente namorados. Nos apaixonamos profundamente e namoramos até nos formarmos no ensino médio. Após a formatura, durante as férias de verão, ela me disse que precisava morar com a irmã na capital para a faculdade. Eu disse que tudo bem, que faríamos um relacionamento à distância funcionar. Eu estudei em uma das universidades da nossa província,
    enquanto ela foi para a cidade com a irmã e decidiu tirar um ano sabático antes de entrar na faculdade. Mantivemos a comunicação durante os primeiros meses à distância. No nosso quarto aniversário, ela me disse que não importava o que acontecesse, eu deveria esperar por ela. Mas, meses depois, ela simplesmente desapareceu. Seu telefone estava desligado, suas redes sociais inativas. Quando tentei me comunicar e fui ignorado, fiquei devastado. Ela virou alguém que eu costumava conhecer. Um de seus amigos estudava no mesmo campus que eu, e uma vez nos encontramos. Tomamos um café e ele me entregou uma carta que ela havia enviado, dizendo que não poderia mais manter o relacionamento à distância e desejava seguir em frente. Curta e me siga para a parte 2.
