- base_text: Minha namorada reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 2. Doeu muito, mas decidi respeitar a decisão dela e também seguir em frente. Um ano depois, conheci outra garota em um workshop. Começamos a sair e, quase um ano depois, começamos a namorar. Agora, somos profissionais, temos uma filha linda, estamos juntos há 8 anos e casados há 2. De repente, recebi uma ligação de um número desconhecido. Era minha ex, perguntando se poderíamos nos encontrar. Aceitei, com a condição de levar minha esposa. Ela ficou furiosa ao telefone, mas insistiu em me encontrar sem minha esposa. Concordamos em nos encontrar em um shopping. Ela me contou que tinha um filho de 4 anos e estava separada do parceiro, que era marinheiro e cortou a comunicação com ela. Quando descobriu que eu era casado e tinha uma filha, ficou chocada porque eu havia prometido esperar por ela. Eu fiquei atônito com a audácia dela. A interrompi e disse que
    ela não podia simplesmente reaparecer na minha vida depois de 10 anos e de tudo o que aconteceu, esperando que eu mantivesse uma promessa de 10 anos atrás que ela mesma havia quebrado. Disse para ela nunca mais entrar em contato comigo. Voltei para a minha esposa e filha em outro restaurante. Minha esposa perguntou como tinha sido e eu disse que contaria tudo quando chegássemos em casa. Ao chegarmos, contei a história e ela me abraçou. Sou extremamente grato por tudo que tenho agora. Aquela ex pode ter sido o meu primeiro amor, mas minha esposa é o maior de todos. O que achou dessa história? Curta e me siga para mais histórias.
