- base_text: 'Meu novo vizinho do andar de baixo fez o síndico me importunar. Espero que ele goste de ser acordado às duas da manhã todas as noites. Parte 2. Enviei um e-mail para a gerente do prédio e disse: não tenho um cachorro. Portanto, não vou pagar essa multa. Ela me responde com um e-mail absurdo, afirmando que recebeu várias reclamações (só tenho um vizinho de baixo) sobre urina vindo da minha varanda. Então ela supôs que eu estava deixando o meu cachorro, que não tenho, fazer xixi na varanda. Aí ela diz que, como não tenho um cachorro, significa que eu ou meu namorado estamos fazendo xixi na nossa varanda. E que ainda estou violando o meu contrato de aluguel. Isso já era cômico. Meu namorado e eu NUNCA fizemos isso. Nunca tivemos reclamações nos nossos quatro anos aqui. E justamente quando ganham um novo vizinho de baixo, começam as reclamações. Agora vem a doce vingança. Trabalho no turno da noite, então não vou para a cama até por volta das seis da manhã. Todas as manhãs, por
    volta das seis horas, ouço meu novo vizinho saindo para o trabalho. Meu namorado e eu decidimos incorporar um novo treino às duas da manhã, quando volto do trabalho, consistindo em polichinelos, corrida no lugar, e todo tipo de atividade divertida. Só para o meu querido vizinho de baixo. Informei ao escritório de locação que não renovarei meu contrato de aluguel em dezembro por causa disso. Os próximos três meses para o meu novo vizinho serão um inferno. Espero que ele aproveite. E você, o que achou dessa história? Curta, me siga e deixe nos comentários.'
