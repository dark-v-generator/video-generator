# DSPy Examples for 2-part TikTok Story Generation
# Input: original English Reddit post. Output: translated Portuguese TikTok script.
# Note: Reddit conventions like letter abbreviations (B, M, J) for names are replaced
# with realistic fake names. Age/gender notation like (28M) is expanded naturally.

- original_post:
    title: "Estranged ex GF came back after 10 years and called me a lier when she found out I already moved on."
    text: |
      I dont know how to start this story, and it has happened a few months ago had a 10 year back story. Back when i was 14 yrs old, i fell inlove with one of my classmate in school. She's kinda gullible in a cute way, and laughs so hard at my jokes even at her expense.
      I started courting her, and she was hesitant at first given that we were very close friends, but she told me she'd give me a chance since she loves being around me. After 3-4 month of courting she then said yes, and we became officially bf and gf.
      We fell in love so hard and dated until we graduated high school. After the graduation, it was summer break, she told me she needs to live with her sister in the Capital city, for college. I told her that it would be okay for us and we can make a long distance relationship work. i studied at one of the Universities in our province, and she went with her sister in the city and decided to take a year off before enrolling in college.
      We communicated a lot for the few months of us being away, i called her for our 4th anniversary, and told me that no matter what I should wait for her. But, then few months later she suddenly disappeared. I cant call her phone, her social media accounts became inactive. And her friends got friended by her new account, i was hurt that she tried to ghost me. When i tried to reach out, and was ignored, it broke me. Suddenly, she became somebody that i used to know. One of her friend comes to the same campus that i went, and I saw her one time, i just politely said hello to her, and she asked me to go out at a cafe near our campus after classes. We met at the cafe and told me that my ex said she was sorry, and gave me a letter she sent.
      The letter said that, she can't make it work having a long distance bf, and she just want to move on and wished me best.
      It freaking hurts I thanked her friend, went to my boarding house and cried ugly, but i decided to respect her decision and moved on too.
      A year passed, and I met a girl in a workshop I attended, we have the same line of course just different school. I asked for her number to communicate with some stuff about the workshop, she was tomboyish, so at first i didn't really noticed her in a romantic way. But we became friends, I end up hanging with her every night, she is taking night classes, she's a working student, as we hang out, she became more girly. She started wearing fit clothes and i noticed her face is pretty when her hair is not ponytailed, and her sexy body just awed me. After almost a year, we are both 3rd year in college, I courted her, and she excitedly said yes, saying that she liked me for the longest time, she just dont want to initiate something because it was kinda frowned upon in our country.
      Now, were both professionals, have a cute daughter, together for eight years, and married for two.
      Suddenly, i got a call from a unknown number, she introduced as my ex gf, asking if we could meet. I hesitated but agreed, in one condition, i have to bring my wife. She became furious on the phone called me a liar and manipulator. But she still insisted in meeting me without my wife, told her i would meet her in a public place.
      We went to a mall and talked in a stall, i started the conversation with "Hi how have you been." She told me she had a 4 year old son, but got seperated with her partner, her partner was a seafarer and cut communication with her, and just sending her money through his mother.
      And told me she went back to our province for me, and when she found out i was married and had a daughter she got shocked because i promised her that id wait for her.
      I was stunned with the audacity, as she stutter while trying to control her crying, I stopped her, and told her gritting my teeth thank you for coming back for me. But, she cant just come back in my life after 10 years, after abandoning me, having a son and other relationships and come back to me when it all of it failed expecting me to hold a 10 year old promise that she broke first. Told her to never contact me again.
      I stood up, thanked the staffs in the stall, eyes red from my emotions, and went to my wife and daughter on another restaurant. My wife asked me how it went, and i told her ill tell the story when we went home, because im furious that time.
      Went home, told her the story, she hugged me. I am very thankful with everything i have right now. That ex may be my first love, but my wife is my greatest.
  narrator_gender: "male"
  part1: |
    Minha ex reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 1. Não sei bem como começar esta história que aconteceu há alguns meses, mas tem um histórico de 10 anos. Quando eu tinha 14 anos, me apaixonei por uma colega de classe. Ela era meio ingênua de um jeito fofo e ria muito das minhas piadas, mesmo quando eram às custas dela. Comecei a conquistar ela e ela hesitou no início, já que éramos amigos muito próximos. Mas ela me disse que me daria uma chance, já que gostava de estar perto de mim. Depois de 3 a 4 meses de cortejo, ela finalmente disse sim e nos tornamos oficialmente namorados. Nos apaixonamos profundamente e namoramos até nos formarmos no ensino médio. Após a formatura, durante as férias de verão, ela me disse que precisava morar com a irmã na capital para a faculdade. Eu disse que tudo bem, que faríamos um relacionamento à distância funcionar. Eu estudei em uma das universidades da nossa província, enquanto ela foi para a cidade com a irmã e decidiu tirar um ano sabático antes de entrar na faculdade. Mantivemos a comunicação durante os primeiros meses à distância. No nosso quarto aniversário, ela me disse que não importava o que acontecesse, eu deveria esperar por ela. Mas, meses depois, ela simplesmente desapareceu. Seu telefone estava desligado, suas redes sociais inativas. Quando tentei me comunicar e fui ignorado, fiquei devastado. Ela virou alguém que eu costumava conhecer. Um de seus amigos estudava no mesmo campus que eu, e uma vez nos encontramos. Tomamos um café e ele me entregou uma carta que ela havia enviado, dizendo que não poderia mais manter o relacionamento à distância e desejava seguir em frente. Curta e me siga para a parte 2.
  part2: |
    Minha ex reapareceu depois de 10 anos e me chamou de mentiroso ao descobrir que eu já tinha seguido em frente. Parte 2. Doeu muito, mas decidi respeitar a decisão dela e também seguir em frente. Um ano depois, conheci outra garota em um workshop. Começamos a sair e, quase um ano depois, começamos a namorar. Agora, somos profissionais, temos uma filha linda, estamos juntos há 8 anos e casados há 2. De repente, recebi uma ligação de um número desconhecido. Era minha ex, perguntando se poderíamos nos encontrar. Aceitei, com a condição de levar minha esposa. Ela ficou furiosa ao telefone, mas insistiu em me encontrar sem minha esposa. Concordamos em nos encontrar em um shopping. Ela me contou que tinha um filho de 4 anos e estava separada do parceiro, que era marinheiro e cortou a comunicação com ela. Quando descobriu que eu era casado e tinha uma filha, ficou chocada porque eu havia prometido esperar por ela. Eu fiquei atônito com a audácia dela. A interrompi e disse que ela não podia simplesmente reaparecer na minha vida depois de 10 anos e de tudo o que aconteceu, esperando que eu mantivesse uma promessa de 10 anos atrás que ela mesma havia quebrado. Disse para ela nunca mais entrar em contato comigo. Voltei para a minha esposa e filha em outro restaurante. Minha esposa perguntou como tinha sido e eu disse que contaria tudo quando chegássemos em casa. Ao chegarmos, contei a história e ela me abraçou. Sou extremamente grato por tudo que tenho agora. Aquela ex pode ter sido o meu primeiro amor, mas minha esposa é o maior de todos. O que achou dessa história? Curta e me siga para mais histórias.

- original_post:
    title: "My new downstairs neighbor made the manager harass me. I hope he likes being woken up at 2 am every night"
    text: |
      I've lived in the same apartment with my boyfriend for almost 4 years. It's not the best apartment but I love the location. I've never really had any problems here, I'm a quiet neighbor that stays to myself.
      My new downstairs neighbor has made several stupid complaints. Like complaints me running my garbage disposal.. But the most recent one was ridiculous. He went and told management that there's been issues with my balcony. I got a call last week asking if I've been throwing anything over my balcony. I told the manager absolutely not. There's plants down below so I had dumped a water bottle off into the plants before but that's not harming anyone..
      Because of this call I went out to my balcony to investigate. I noticed my flower vase had fallen over and some water may of spilled down. Not too big of a deal. There wasn't too much water in the vase when the wind knocked it over. I think this is the end of that silly complaint but I was wrong. The weekend passes and I get a nasty notice on my door. The notice said Pet violation for not picking up after my dog $50 fine. And stating I'm at risk of getting my lease terminated because of my violations. The only problem is… I don't have a dog!
      I emailed the property manager and said "I do not have a dog. Therefore I'm not paying this fine" she sends back a RIDICULOUS email stating that she's received SEVERAL complaints (I only have one downstairs neighbor) about urine coming from my balcony, so she ASSUMED I was letting my dog (that I don't have) pee on my balcony.. then she says since I don't have a dog that means me or my boyfriend are peeing on our balcony!!!! And that I'm still in violation of my lease! This was just comical at this point. My boyfriend and I have NEVER done this. We've never had any complaints in our 4 years here. It just so happens as soon as I got a new downstairs neighbor the complaints came rolling in.
      Here's where the petty revenge kicks in. I work night shift so I don't go to bed until around 6am. Every morning around 6 am I hear my new neighbor leaving for work. My boyfriend and I decided to incorporate a new 2 am workout when I get home from work consisting of jumping jacks, running in place and all sorts of fun stuff just for my lovely downstairs neighbor. I've informed the leasing office that I won't be renewing my lease in December due to this. The next 3 months for my new neighbor is going to be hell. I hope he enjoys it.
  narrator_gender: "female"
  part1: |
    Meu novo vizinho do andar de baixo fez o síndico me perseguir. Espero que ele goste de ser acordado às duas da manhã todas as noites. Parte 1. Moro no mesmo apartamento com meu namorado há quase quatro anos. Não é o melhor apartamento, mas adoro a localização. Nunca tive realmente problemas aqui, sou uma vizinha tranquila e fico na minha. Meu novo vizinho de baixo fez várias reclamações tolas, como reclamar por eu usar o triturador de lixo. Mas a mais recente foi ridícula. Ele foi falar com o síndico que havia problemas com a minha varanda. Recebi uma ligação na semana passada perguntando se eu tinha jogado algo pela minha varanda. Eu disse ao síndico que absolutamente não. Há plantas embaixo, então, eu tinha jogado água nelas. Mas isso não prejudica ninguém. Por causa dessa ligação, fui investigar minha varanda. Percebi que meu vaso de flores tinha caído e que um pouco de água pode ter escorrido. Nada demais, não havia muita água no vaso quando o vento derrubou. Achei que tinha sido o fim daquela queixa tola. Mas eu estava errada. O fim de semana passa e recebo um aviso rude na minha porta. O aviso dizia violação de animal de estimação por não limpar após o meu cachorro. Multa de 50 dólares. E afirmava que eu corria o risco de ter meu contrato de aluguel terminado por causa das minhas violações. O único problema é, eu não tenho um cachorro. Então, eu fui tirar satisfação sobre isso. Curta e me siga para a parte 2.
  part2: |
    Meu novo vizinho do andar de baixo fez o síndico me perseguir. Espero que ele goste de ser acordado às duas da manhã todas as noites. Parte 2. Enviei um e-mail para a gerente do prédio e disse: não tenho um cachorro. Portanto, não vou pagar essa multa. Ela me responde com um e-mail absurdo, afirmando que recebeu várias reclamações, só tenho um vizinho de baixo, sobre urina vindo da minha varanda. Então ela supôs que eu estava deixando o meu cachorro, que não tenho, fazer xixi na varanda. Aí ela diz que, como não tenho um cachorro, significa que eu ou meu namorado estamos fazendo xixi na nossa varanda. E que ainda estou violando o meu contrato de aluguel. Isso já era cômico. Meu namorado e eu NUNCA fizemos isso. Nunca tivemos reclamações nos nossos quatro anos aqui. E justamente quando ganham um novo vizinho de baixo, começam as reclamações. Agora vem a doce vingança. Trabalho no turno da noite, então não vou para a cama até por volta das seis da manhã. Todas as manhãs, por volta das seis horas, ouço meu novo vizinho saindo para o trabalho. Meu namorado e eu decidimos incorporar um novo treino às duas da manhã, quando volto do trabalho, consistindo em polichinelos, corrida no lugar, e todo tipo de atividade divertida. Só para o meu querido vizinho de baixo. Informei ao escritório de locação que não renovarei meu contrato de aluguel em dezembro por causa disso. Os próximos três meses para o meu novo vizinho serão um inferno. Espero que ele aproveite. E você, o que achou dessa história? Curta, me siga e deixe nos comentários.
