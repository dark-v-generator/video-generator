# DSPy Examples for 2-part TikTok Story Generation
# Input: original English Reddit post. Output: translated Portuguese TikTok script.
# Hook anatomy applied in these examples:
# - `title` is the strong hook SHOWN ON THE COVER (read by the viewer, NOT narrated):
#   leads by concrete harm/injustice, clear victim + antagonist, no spoilers of the outcome.
# - part1/part2 narration begins DIRECTLY in the story — no title, no "Parte N." marker.
# - Letter abbreviations (B, M, J) replaced with realistic fake names.
# - Natural, colloquial language (e.g., "print" not "captura de tela").
# - Part 1 ends BEFORE the climax; Part 2 contains the climax and resolution.

- original_post:
    title: "Charged my old roommate for every item he 'borrowed' and never returned"
    text: |
      Lived with my college roommate M(24m) for two years. I'm 23m. During that time he constantly "borrowed" my stuff. Kitchen supplies, tools, books, even my winter jacket once. He'd always say he'd return it but never did. When I asked for things back he'd say he lost them or couldn't find them.
      When our lease ended I moved out first. I made a detailed spreadsheet of every single item he had taken over two years with the replacement cost. Total came to $847. I printed it out, attached receipts where I had them, and left it on the kitchen counter with a note saying "You can Venmo me or I'll file in small claims court. Your choice."
      He texted me furious saying I was being ridiculous. I just sent him a screenshot of the small claims court filing page. He paid me $600 the next day and dropped off a box of my stuff he "found" at his parents house. Funny how things appear when there are consequences.
  title: "Meu colega de quarto passou dois anos levando minhas coisas e nunca devolvia nada"
  narrator_gender: "male"
  part1: |
    Morava com o Marcos, meu colega de faculdade, e durante dois anos ele vivia pegando minhas coisas emprestadas. Coisas de cozinha, ferramentas, livros, até minha jaqueta de inverno uma vez. Ele sempre dizia que ia devolver mas nunca devolvia. Quando eu pedia de volta, ele dizia que tinha perdido ou que não achava. Eu ficava irritado mas deixava passar porque a gente dividia o apartamento e não queria criar clima. Só que com o tempo fui percebendo que a lista de coisas sumidas só crescia. Aí nosso contrato acabou e eu fui o primeiro a sair. Mas antes de ir embora, eu fiz uma coisa. Curta e me siga para a parte 2.
  part2: |
    Antes de sair do apartamento, eu fiz uma planilha detalhada de cada item que o Marcos tinha levado nesses dois anos, com o preço de reposição de cada um. O total deu 847 dólares. Imprimi tudo, anexei os recibos que eu tinha e deixei no balcão da cozinha com um bilhete dizendo que ele podia me pagar por Venmo ou eu ia abrir um processo no juizado de pequenas causas. Escolha dele. Ele me mandou mensagem furioso dizendo que eu tava sendo ridículo. Eu só mandei um print da página do juizado. No dia seguinte ele me pagou 600 dólares e apareceu com uma caixa das minhas coisas que ele "achou" na casa dos pais dele. Engraçado como as coisas aparecem quando tem consequência. E você, o que teria feito? Curta, me siga e conta nos comentários.

- original_post:
    title: "My new downstairs neighbor made the manager harass me. I hope he likes being woken up at 2 am every night"
    text: |
      I've lived in the same apartment with my boyfriend for almost 4 years. It's not the best apartment but I love the location. I've never really had any problems here, I'm a quiet neighbor that stays to myself.
      My new downstairs neighbor has made several stupid complaints. Like complaints me running my garbage disposal.. But the most recent one was ridiculous. He went and told management that there's been issues with my balcony. I got a call last week asking if I've been throwing anything over my balcony. I told the manager absolutely not. There's plants down below so I had dumped a water bottle off into the plants before but that's not harming anyone..
      Because of this call I went out to my balcony to investigate. I noticed my flower vase had fallen over and some water may of spilled down. Not too big of a deal. There wasn't too much water in the vase when the wind knocked it over. I think this is the end of that silly complaint but I was wrong. The weekend passes and I get a nasty notice on my door. The notice said Pet violation for not picking up after my dog $50 fine. And stating I'm at risk of getting my lease terminated because of my violations. The only problem is… I don't have a dog!
      I emailed the property manager and said "I do not have a dog. Therefore I'm not paying this fine" she sends back a RIDICULOUS email stating that she's received SEVERAL complaints (I only have one downstairs neighbor) about urine coming from my balcony, so she ASSUMED I was letting my dog (that I don't have) pee on my balcony.. then she says since I don't have a dog that means me or my boyfriend are peeing on our balcony!!!! And that I'm still in violation of my lease! This was just comical at this point. My boyfriend and I have NEVER done this. We've never had any complaints in our 4 years here. It just so happens as soon as I got a new downstairs neighbor the complaints came rolling in.
      Here's where the petty revenge kicks in. I work night shift so I don't go to bed until around 6am. Every morning around 6 am I hear my new neighbor leaving for work. My boyfriend and I decided to incorporate a new 2 am workout when I get home from work consisting of jumping jacks, running in place and all sorts of fun stuff just for my lovely downstairs neighbor. I've informed the leasing office that I won't be renewing my lease in December due to this. The next 3 months for my new neighbor is going to be hell. I hope he enjoys it.
  title: "Meu vizinho novo do andar de baixo fez o síndico me perseguir"
  narrator_gender: "female"
  part1: |
    Faz quase quatro anos que moro nesse apartamento com meu namorado e nunca tive problema com ninguém, até chegar meu vizinho novo do andar de baixo. Ele começou a fazer várias reclamações sem noção. Tipo reclamar que eu tava usando o triturador de lixo da pia. Mas a mais recente foi ridícula. Ele foi falar pro síndico que tinha problema com a minha varanda. Recebi uma ligação perguntando se eu tava jogando alguma coisa pela varanda. Eu disse que de jeito nenhum. Tem plantas lá embaixo e eu tinha jogado uma água nelas, mas isso não faz mal a ninguém. Por causa dessa ligação, fui até a varanda investigar. Vi que meu vaso de flor tinha caído e talvez um pouco de água tenha escorrido. Nada absurdo, não tinha muita água no vaso quando o vento derrubou. Achei que era o fim daquela reclamação boba. Mas eu tava errada. O fim de semana passou e quando abri a porta tinha um aviso grudado. O aviso dizia violação por animal de estimação, multa de 50 dólares por não limpar cocô do meu cachorro. E ainda diziam que eu tava correndo risco de perder o contrato do aluguel. O único problema é que eu não tenho cachorro. Mandei um e-mail pra gerente e disse: não tenho cachorro, não vou pagar essa multa. E a resposta que ela me mandou me deixou de queixo caído. Curta e me siga para a parte 2.
  part2: |
    A gerente me mandou um e-mail absurdo dizendo que recebeu várias reclamações, sendo que eu só tenho um vizinho de baixo, sobre urina vindo da minha varanda. Ela supôs que eu tava deixando meu cachorro, que eu não tenho, fazer xixi na varanda. E aí a melhor parte: como eu não tenho cachorro, ela concluiu que eu ou meu namorado estávamos fazendo xixi na varanda. E que eu ainda tava violando meu contrato de aluguel. Isso já era cômico. Meu namorado e eu nunca fizemos isso na vida. Nunca tivemos uma reclamação em 4 anos aqui. E justamente quando chega um vizinho novo, as reclamações começam a chover. Então decidi me vingar. Eu trabalho à noite e só vou dormir lá pelas 6 da manhã. E todo dia às 6 eu ouço meu vizinho saindo pra trabalhar. Eu e meu namorado decidimos começar um treino às 2 da manhã quando eu chego do trabalho. Polichinelo, corrida no lugar, e todo tipo de coisa divertida, especialmente pro nosso querido vizinho de baixo. Avisei a administração que não vou renovar meu aluguel em dezembro por causa disso. Os próximos 3 meses pro meu vizinho vão ser um inferno. Espero que ele aproveite. E você, o que faria no meu lugar? Curta, me siga e deixa nos comentários.

- original_post:
    title: "Got my terrible boss fired by documenting everything for 6 months"
    text: |
      I (28f) worked at a marketing agency for 3 years. My boss L(45f) was the worst manager I've ever had. She would take credit for everyone's work in meetings with the directors. She would assign us impossible deadlines then blame us when things weren't perfect. She once made my coworker cry by screaming at her in front of the whole office for a typo in an internal email.
      I started documenting everything. Every email where she took credit, every unreasonable deadline, every instance of her being unprofessional. I saved screenshots, kept a log with dates and times, and even got statements from three coworkers who were willing to back me up.
      After 6 months of documentation I scheduled a meeting with HR and the company director. I brought my folder with everything organized chronologically. The director's face went pale as he read through it. They launched an investigation and within two weeks she was let go. Three of us got promoted to fill the gap. Best part? She had been telling everyone she was irreplaceable.
  title: "Minha chefe humilhava a equipe inteira e levava o crédito de todo trabalho que a gente fazia"
  narrator_gender: "female"
  part1: |
    A Lúcia, minha chefe numa agência de marketing onde trabalhei por três anos, era a pior gestora que eu já tive na vida. Ela pegava o crédito do trabalho de todo mundo nas reuniões com a diretoria. Dava prazos impossíveis e depois jogava a culpa na gente quando as coisas não saíam perfeitas. Uma vez ela fez minha colega chorar gritando com ela na frente do escritório inteiro por causa de um errinho num e-mail interno. Eu aguentei um tempo calada, mas cheguei no meu limite. Então comecei a documentar tudo. Cada e-mail onde ela pegava crédito, cada prazo absurdo, cada momento em que ela era completamente antiprofissional. Salvava prints, mantinha um registro com datas e horários, e até consegui depoimentos de três colegas que toparam me apoiar. Fiz isso por seis meses seguidos. Curta e me siga para a parte 2.
  part2: |
    Depois de 6 meses juntando provas, marquei uma reunião com o RH e o diretor da empresa. Levei minha pasta com tudo organizado em ordem cronológica. O diretor ficou pálido enquanto lia. Eles abriram uma investigação e em duas semanas a Lúcia foi demitida. Três de nós fomos promovidos pra cobrir a vaga. A melhor parte? Ela vivia dizendo pra todo mundo que era insubstituível. E você, já teve um chefe assim? Curta, me siga e conta nos comentários.
