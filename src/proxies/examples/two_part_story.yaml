# DSPy Examples for 2-part TikTok Story Generation
# Input: original English Reddit post. Output: translated Portuguese TikTok script.
# Rules applied in examples:
# - Letter abbreviations (B, M, J) replaced with realistic fake names
# - Natural, colloquial language (e.g., "print" not "captura de tela")
# - Titles are natural and conversational, not forced or clickbaity
# - Part 1 ends BEFORE the climax, Part 2 contains the climax and resolution

- original_post:
    title: "Estranged ex GF came back after 10 years and called me a lier when she found out I already moved on."
    text: |
      I dont know how to start this story, and it has happened a few months ago had a 10 year back story. Back when i was 14 yrs old, i fell inlove with one of my classmate in school. She's kinda gullible in a cute way, and laughs so hard at my jokes even at her expense.
      I started courting her, and she was hesitant at first given that we were very close friends, but she told me she'd give me a chance since she loves being around me. After 3-4 month of courting she then said yes, and we became officially bf and gf.
      We fell in love so hard and dated until we graduated high school. After the graduation, it was summer break, she told me she needs to live with her sister in the Capital city, for college. I told her that it would be okay for us and we can make a long distance relationship work. i studied at one of the Universities in our province, and she went with her sister in the city and decided to take a year off before enrolling in college.
      We communicated a lot for the few months of us being away, i called her for our 4th anniversary, and told me that no matter what I should wait for her. But, then few months later she suddenly disappeared. I cant call her phone, her social media accounts became inactive. And her friends got friended by her new account, i was hurt that she tried to ghost me. When i tried to reach out, and was ignored, it broke me. Suddenly, she became somebody that i used to know. One of her friend comes to the same campus that i went, and I saw her one time, i just politely said hello to her, and she asked me to go out at a cafe near our campus after classes. We met at the cafe and told me that my ex said she was sorry, and gave me a letter she sent.
      The letter said that, she can't make it work having a long distance bf, and she just want to move on and wished me best.
      It freaking hurts I thanked her friend, went to my boarding house and cried ugly, but i decided to respect her decision and moved on too.
      A year passed, and I met a girl in a workshop I attended, we have the same line of course just different school. I asked for her number to communicate with some stuff about the workshop, she was tomboyish, so at first i didn't really noticed her in a romantic way. But we became friends, I end up hanging with her every night, she is taking night classes, she's a working student, as we hang out, she became more girly. She started wearing fit clothes and i noticed her face is pretty when her hair is not ponytailed, and her sexy body just awed me. After almost a year, we are both 3rd year in college, I courted her, and she excitedly said yes, saying that she liked me for the longest time, she just dont want to initiate something because it was kinda frowned upon in our country.
      Now, were both professionals, have a cute daughter, together for eight years, and married for two.
      Suddenly, i got a call from a unknown number, she introduced as my ex gf, asking if we could meet. I hesitated but agreed, in one condition, i have to bring my wife. She became furious on the phone called me a liar and manipulator. But she still insisted in meeting me without my wife, told her i would meet her in a public place.
      We went to a mall and talked in a stall, i started the conversation with "Hi how have you been." She told me she had a 4 year old son, but got seperated with her partner, her partner was a seafarer and cut communication with her, and just sending her money through his mother.
      And told me she went back to our province for me, and when she found out i was married and had a daughter she got shocked because i promised her that id wait for her.
      I was stunned with the audacity, as she stutter while trying to control her crying, I stopped her, and told her gritting my teeth thank you for coming back for me. But, she cant just come back in my life after 10 years, after abandoning me, having a son and other relationships and come back to me when it all of it failed expecting me to hold a 10 year old promise that she broke first. Told her to never contact me again.
      I stood up, thanked the staffs in the stall, eyes red from my emotions, and went to my wife and daughter on another restaurant. My wife asked me how it went, and i told her ill tell the story when we went home, because im furious that time.
      Went home, told her the story, she hugged me. I am very thankful with everything i have right now. That ex may be my first love, but my wife is my greatest.
  narrator_gender: "male"
  part1: |
    Minha ex reapareceu depois de 10 anos e me chamou de mentiroso quando viu que eu já tinha seguido em frente. Parte 1. Não sei bem como começar essa história, mas ela aconteceu há alguns meses e tem um contexto de 10 anos. Quando eu tinha 14 anos, me apaixonei por uma colega de classe. Ela era meio ingênua de um jeito fofo e ria muito das minhas piadas, mesmo quando eram sobre ela. Comecei a correr atrás dela e ela ficou na dúvida no começo porque a gente era muito amigo. Mas me disse que ia me dar uma chance porque gostava de estar perto de mim. Depois de uns 3 a 4 meses, ela disse sim e a gente começou a namorar. A gente se apaixonou de verdade e namorou até o fim do ensino médio. Depois da formatura, nas férias, ela me disse que precisava ir morar com a irmã na capital pra fazer faculdade. Eu disse que tudo bem, que a gente ia fazer o relacionamento à distância funcionar. Eu fiquei estudando numa universidade da nossa cidade e ela foi pra capital com a irmã. Nos primeiros meses a gente se falava bastante. No nosso quarto aniversário, ela me ligou e disse que não importava o que acontecesse, eu tinha que esperar por ela. Só que, alguns meses depois, ela simplesmente sumiu. O celular não chamava mais, as redes sociais ficaram inativas. Quando tentei falar com ela e fui ignorado, me destruiu. Ela virou alguém que eu costumava conhecer. Uma amiga dela estudava no mesmo campus que eu, e um dia a gente se encontrou e tomou um café. Ela me entregou uma carta que minha ex tinha mandado. A carta dizia que ela não conseguia manter um namoro à distância e queria seguir em frente. Doeu demais, mas eu decidi respeitar a decisão dela e seguir em frente também. Um ano depois, conheci uma garota num workshop. A gente virou amigo, e quase um ano depois começamos a namorar. Hoje a gente é formado, tem uma filha linda, está junto há 8 anos e casado há 2. Até que um dia recebi uma ligação de um número desconhecido. Curta e me siga para a parte 2.
  part2: |
    Minha ex reapareceu depois de 10 anos e me chamou de mentiroso quando viu que eu já tinha seguido em frente. Parte 2. Atendi o telefone e era a minha ex. Ela queria que a gente se encontrasse. Eu concordei, mas com uma condição: eu ia levar minha esposa. Ela ficou furiosa, me chamou de mentiroso e manipulador. Mas insistiu em me encontrar sem a minha esposa. Combinei de encontrar ela num shopping. Lá, ela me contou que tinha um filho de 4 anos e que tinha se separado do parceiro, que era marinheiro e cortou contato com ela, só mandava dinheiro pela mãe dele. Disse que tinha voltado pra nossa cidade por minha causa. E quando descobriu que eu era casado e tinha uma filha, ficou em choque, porque eu tinha prometido esperar por ela. Eu fiquei parado olhando pra ela sem acreditar na cara de pau. Enquanto ela gaguejava tentando segurar o choro, eu a interrompi e disse, com os dentes cerrados, que ela não podia simplesmente sumir da minha vida por 10 anos, ter filho com outro, outros relacionamentos, e agora voltar quando tudo deu errado esperando que eu cumprisse uma promessa de 10 anos atrás que ela mesma quebrou primeiro. Disse pra ela nunca mais entrar em contato comigo. Levantei, saí de lá com os olhos vermelhos e fui encontrar minha esposa e minha filha em outro restaurante. Minha esposa perguntou como foi e eu disse que contava em casa porque eu tava muito nervoso. Cheguei em casa, contei tudo, e ela me abraçou. Sou muito grato por tudo que tenho agora. Minha ex pode ter sido meu primeiro amor, mas minha esposa é o maior de todos. E você, o que achou? Curta, me siga e conta nos comentários.

- original_post:
    title: "My new downstairs neighbor made the manager harass me. I hope he likes being woken up at 2 am every night"
    text: |
      I've lived in the same apartment with my boyfriend for almost 4 years. It's not the best apartment but I love the location. I've never really had any problems here, I'm a quiet neighbor that stays to myself.
      My new downstairs neighbor has made several stupid complaints. Like complaints me running my garbage disposal.. But the most recent one was ridiculous. He went and told management that there's been issues with my balcony. I got a call last week asking if I've been throwing anything over my balcony. I told the manager absolutely not. There's plants down below so I had dumped a water bottle off into the plants before but that's not harming anyone..
      Because of this call I went out to my balcony to investigate. I noticed my flower vase had fallen over and some water may of spilled down. Not too big of a deal. There wasn't too much water in the vase when the wind knocked it over. I think this is the end of that silly complaint but I was wrong. The weekend passes and I get a nasty notice on my door. The notice said Pet violation for not picking up after my dog $50 fine. And stating I'm at risk of getting my lease terminated because of my violations. The only problem is… I don't have a dog!
      I emailed the property manager and said "I do not have a dog. Therefore I'm not paying this fine" she sends back a RIDICULOUS email stating that she's received SEVERAL complaints (I only have one downstairs neighbor) about urine coming from my balcony, so she ASSUMED I was letting my dog (that I don't have) pee on my balcony.. then she says since I don't have a dog that means me or my boyfriend are peeing on our balcony!!!! And that I'm still in violation of my lease! This was just comical at this point. My boyfriend and I have NEVER done this. We've never had any complaints in our 4 years here. It just so happens as soon as I got a new downstairs neighbor the complaints came rolling in.
      Here's where the petty revenge kicks in. I work night shift so I don't go to bed until around 6am. Every morning around 6 am I hear my new neighbor leaving for work. My boyfriend and I decided to incorporate a new 2 am workout when I get home from work consisting of jumping jacks, running in place and all sorts of fun stuff just for my lovely downstairs neighbor. I've informed the leasing office that I won't be renewing my lease in December due to this. The next 3 months for my new neighbor is going to be hell. I hope he enjoys it.
  narrator_gender: "female"
  part1: |
    Meu vizinho novo do andar de baixo fez o síndico me perseguir. Parte 1. Moro no mesmo apartamento com meu namorado há quase quatro anos. Não é o melhor apartamento, mas adoro a localização. Nunca tive problema nenhum aqui, sou uma vizinha tranquila que fica na dela. Meu vizinho novo de baixo começou a fazer várias reclamações sem noção. Tipo reclamar que eu tava usando o triturador de lixo da pia. Mas a mais recente foi ridícula. Ele foi falar pro síndico que tinha problema com a minha varanda. Recebi uma ligação perguntando se eu tava jogando alguma coisa pela varanda. Eu disse que de jeito nenhum. Tem plantas lá embaixo e eu tinha jogado uma água nelas, mas isso não faz mal a ninguém. Por causa dessa ligação, fui até a varanda investigar. Vi que meu vaso de flor tinha caído e talvez um pouco de água tenha escorrido. Nada absurdo, não tinha muita água no vaso quando o vento derrubou. Achei que era o fim daquela reclamação boba. Mas eu tava errada. O fim de semana passou e quando abri a porta tinha um aviso grudado. O aviso dizia violação por animal de estimação, multa de 50 dólares por não limpar cocô do meu cachorro. E ainda diziam que eu tava correndo risco de perder o contrato do aluguel. O único problema é que eu não tenho cachorro. Mandei um e-mail pra gerente e disse: não tenho cachorro, não vou pagar essa multa. E a resposta que ela me mandou me deixou de queixo caído. Curta e me siga para a parte 2.
  part2: |
    Meu vizinho novo do andar de baixo fez o síndico me perseguir. Parte 2. A gerente me mandou um e-mail absurdo dizendo que recebeu várias reclamações, sendo que eu só tenho um vizinho de baixo, sobre urina vindo da minha varanda. Ela supôs que eu tava deixando meu cachorro, que eu não tenho, fazer xixi na varanda. E aí a melhor parte: como eu não tenho cachorro, ela concluiu que eu ou meu namorado estávamos fazendo xixi na varanda. E que eu ainda tava violando meu contrato de aluguel. Isso já era cômico. Meu namorado e eu nunca fizemos isso na vida. Nunca tivemos uma reclamação em 4 anos aqui. E justamente quando chega um vizinho novo, as reclamações começam a chover. Então decidi me vingar. Eu trabalho à noite e só vou dormir lá pelas 6 da manhã. E todo dia às 6 eu ouço meu vizinho saindo pra trabalhar. Eu e meu namorado decidimos começar um treino às 2 da manhã quando eu chego do trabalho. Polichinelo, corrida no lugar, e todo tipo de coisa divertida, especialmente pro nosso querido vizinho de baixo. Avisei a administração que não vou renovar meu aluguel em dezembro por causa disso. Os próximos 3 meses pro meu vizinho vão ser um inferno. Espero que ele aproveite. E você, o que faria no meu lugar? Curta, me siga e deixa nos comentários.

- original_post:
    title: "I discovered ex bf was cheating so i exposed him..."
    text: |
      So fifteen yrs ago, fresh out of university I started working at a local bank. It was here that I started dating B(28m,)I was 22f at the time. The thing was, back then I was still in a religious bubble and was the no sex before marriage type of person and this man used to constantly beg me for sex anyway then get moody when I said no.
      The constant begging became too much so one certain friday, I told him to get a girl he could actually have sex with and to stop bothering me, and his response was,"fine, but you're probably a b*tch anyway."
      Thing is I knew B's plans for that particular weekend,so I wanted to do a very petty thing knowing he would have no internet access. So I logged into his Facebook with the intention to write a silly status update but before that, I went to his messages and realised that not only did he have seven gfs but also he would brag about his sexual activities to his best friend.
      I took screenshots of conversations he had with each girl including me, then pasted them on his wall as well as the conversations he had with his friend. I also logged into his Gtalk(it was a thing back then) and did the same, screenshot and paste on his Facebook wall, then I changed the Facebook and email passwords and just sat back and waited.
      Monday came, and I just watched as these girls would go into his office and then come out looking angry, whilst i just sat in my cubicle giggling. I even did the same so I wouldn't seem suspicious, by the time I got there, B looked like so stressed. His best friend didn't even come for the usual lunchtime visit. Funny thing is I decided to be petty because he called me a b*tch, which wouldn't have happened if never called me that nane.
  narrator_gender: "female"
  part1: |
    Descobri que meu ex tava me traindo e expus ele... Parte 1. Há quinze anos atrás, recém-formada, comecei a trabalhar num banco da cidade. Foi lá que comecei a namorar o Bruno, que tinha 28 anos na época. Eu tinha 22. O negócio é que naquela época eu ainda vivia numa bolha religiosa e era do tipo que não queria fazer nada antes do casamento. E esse cara ficava insistindo pra gente transar e depois ficava de mau humor quando eu dizia não. Essa insistência toda ficou insuportável, então numa sexta-feira eu falei pra ele arrumar uma garota com quem ele pudesse transar de verdade e parar de me encher. A resposta dele foi: "Tanto faz, você é uma vagabunda mesmo." Eu sabia dos planos dele pro fim de semana e sabia que ele não ia ter acesso à internet. Então entrei no Facebook dele pra escrever um status engraçado, mas antes disso fui nas mensagens dele. E o que eu vi ali me deixou sem chão. Curta e me siga para a parte 2.
  part2: |
    Descobri que meu ex tava me traindo e expus ele... Parte 2. Quando abri as mensagens do Bruno, descobri que ele não só tinha sete namoradas ao mesmo tempo, como também ficava se gabando de tudo pro melhor amigo dele. Tirei print de todas as conversas que ele teve com cada garota, incluindo comigo, e colei tudo no mural dele. As conversas com o amigo também. Entrei no Gtalk dele, que era uma coisa da época, e fiz a mesma coisa, tirei print de tudo e colei no Facebook. Depois troquei as senhas do Facebook e do e-mail e fiquei esperando. Segunda-feira chegou e eu fiquei assistindo essas garotas entrando no escritório dele e saindo furiosas, enquanto eu ficava sentada na minha baia rindo. Eu mesma fui lá pra não parecer suspeita. Quando cheguei, o Bruno tava destruído de estresse. O melhor amigo dele nem apareceu na hora do almoço como fazia sempre. O engraçado é que eu só resolvi fazer tudo isso porque ele me chamou de vagabunda. Se ele nunca tivesse me chamado daquele nome, nada disso teria acontecido. E você, o que teria feito no meu lugar? Curta, me siga e conta nos comentários.
